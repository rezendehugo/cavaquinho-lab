name: Publicar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v7
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Verificar lint
        run: npm run lint
      - name: Verificar tipos
        run: npm run typecheck
      - name: Rodar testes
        run: npm test
      - name: Gerar site
        run: npm run build
      - name: Preparar fallback de rotas
        run: cp dist/index.html dist/404.html
      - name: Preparar Pages
        uses: actions/configure-pages@v5
      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
